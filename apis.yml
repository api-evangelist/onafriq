apis:
  - aid: onafriq:onafriq-async-payouts-api
    name: Onafriq Async Payouts API
    description: >-
      Asynchronous payouts designed for Money Transfer Organizations (MTOs)
      and disbursement partners. Partners create payments to mobile money
      wallets, cash pickup points, and bank accounts; results are delivered
      via webhook as the transaction state updates. REST/JSON interface.
    humanURL: https://developer.mfsafrica.com/docs/async-payments-api
    tags:
      - Payments
      - Payouts
      - Disbursements
      - Mobile Money
      - Remittance
      - Webhooks
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/async-payments-api
      - type: Documentation
        url: https://developers.onafriq.com/docs/remittance-apis-v1/ltkyfhltgh35s-async-api-methods
  - aid: onafriq:onafriq-sync-payouts-api
    name: Onafriq Sync Payouts API
    description: >-
      Synchronous payouts custom-built for Mobile Network Operators (MNOs)
      and partners that require synchronous responses. Transaction results
      are returned within seconds as a response to the trans_com call.
    humanURL: https://developer.mfsafrica.com/docs/sync-disbursements-api
    tags:
      - Payments
      - Payouts
      - Mobile Money
      - MNO
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/sync-disbursements-api
  - aid: onafriq:onafriq-sync-bank-transfers-api
    name: Onafriq Sync Bank Transfers API
    description: >-
      Synchronous bank transfer API for sending funds directly to bank
      accounts across the Onafriq network with real-time response semantics.
    humanURL: https://developer.mfsafrica.com/docs/web-service-summary-4
    tags:
      - Payments
      - Bank Transfers
      - Disbursements
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/web-service-summary-4
  - aid: onafriq:onafriq-collections-api
    name: Onafriq Collections API
    description: >-
      Collections (Payins) API for receiving funds from customers across
      cards, cash agent networks, and mobile money wallets. Supports
      merchant-pull and subscriber-initiated models with real-time
      transaction confirmation and USD settlement to bank accounts.
    humanURL: https://developer.mfsafrica.com/docs/overview-5
    tags:
      - Payments
      - Collections
      - Payins
      - Mobile Money
      - Cards
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/overview-5
  - aid: onafriq:onafriq-rates-api
    name: Onafriq Get Rates API
    description: >-
      Programmatic access to daily foreign-exchange rates used by the
      Onafriq network so partners can price cross-border transactions and
      perform pre-trade quoting before submitting a payout.
    humanURL: https://developer.mfsafrica.com/docs/combined-api-information
    tags:
      - Foreign Exchange
      - Rates
      - Cross-Border Payments
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/combined-api-information
  - aid: onafriq:onafriq-webhooks-api
    name: Onafriq Async Webhooks API
    description: >-
      Instant Payment Notification (IPN) webhooks delivered asynchronously
      to partner endpoints as transaction state changes — used in
      combination with the Async Payouts and Async Collections flows.
    humanURL: https://developer.mfsafrica.com/docs/combined-api-information
    tags:
      - Webhooks
      - Notifications
      - Payments
      - Eventing
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/combined-api-information
  - aid: onafriq:onafriq-contacts-api
    name: Onafriq Contacts API
    description: >-
      Contacts API for adding and retrieving customer (payer / payee)
      records used across Payins, Payouts, and reconciliation workflows
      on the Enterprise Platform.
    humanURL: https://developer.mfsafrica.com/docs/api-overview
    tags:
      - Contacts
      - Customers
      - Identity
    properties:
      - type: Documentation
        url: https://developer.mfsafrica.com/docs/api-overview
  - aid: onafriq:baxi-agent-banking-api
    name: Baxi Agent Banking API
    description: >-
      Onafriq's Nigerian agent-banking platform (Baxi) exposes Virtual
      Account, Fingerprint (POS biometric activation), and Account Debit
      (cardless cash-out) APIs spanning a 460,000+ agent network across
      all 36 Nigerian states. Supports bill payment, airtime/data, cable
      TV, and e-Naira exchange.
    humanURL: https://onafriq.com/services/agent-banking
    tags:
      - Agent Banking
      - Cash-In Cash-Out
      - Bill Payment
      - Airtime
      - Nigeria
      - Baxi
    properties:
      - type: Documentation
        url: https://onafriq.com/services/agent-banking
  - aid: onafriq:onafriq-card-issuance-api
    name: Onafriq Card Issuance API
    description: >-
      Card issuance and processing platform for partners launching
      physical and virtual prepaid card programs, including Visa virtual
      card creation, lifecycle management, and globally accepted spend.
    humanURL: https://onafriq.com/services/card-issuance-and-processing
    tags:
      - Cards
      - Card Issuance
      - Prepaid
      - Virtual Cards
    properties:
      - type: Documentation
        url: https://onafriq.com/services/card-issuance-and-processing
