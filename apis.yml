aid: onafriq
name: Onafriq
description: >-
  Onafriq (formerly MFS Africa) is a pan-African digital payments network
  headquartered in London with operating entities across Mauritius, Ghana,
  Nigeria, Tanzania, Rwanda, Uganda, the DRC, and the UK. Founded by CEO Dare
  Okoudjou, Onafriq operates what it calls "Africa's largest digital payments
  gateway" — a network of networks connecting roughly one billion mobile money
  wallets and 500 million bank accounts across 40+ African countries through
  2,000+ cross-border corridors. The platform exposes a REST API surface for
  partners including Money Transfer Organizations (MTOs), Mobile Network
  Operators (MNOs), banks, NGOs, governments, and enterprises. Core developer
  products include Async Payouts (the recommended path for MTOs and bulk
  disbursement partners, with webhook-based status updates), Sync Payouts
  (custom-built for MNOs requiring synchronous responses), Sync Bank Transfers,
  Collections APIs (Payins) for receiving funds from cards, cash agents, and
  mobile wallets, a Contacts API for managing payer/payee records, a Get Rates
  API for daily foreign exchange rates, and Async Webhooks for Instant Payment
  Notifications. Two distinct portal endpoints serve domestic
  (api.mfsafrica.com/api) and cross-border (mfsafrica.beyonicpartners.com/api)
  workloads. Beyond cross-border remittance and disbursement, Onafriq operates
  Baxi — a Nigerian agent banking network of 460,000+ agents across all 36
  states with its own Virtual Account, Fingerprint, and Account Debit APIs —
  plus card issuance and processing for physical/virtual prepaid programs and
  multi-currency treasury services. Onafriq has raised $200M+ in Series C
  funding from Vitruvian Partners, AXA Investment Managers, and Goodwell, and
  holds 16 payment licenses including FSC (Mauritius) and FCA (UK) authorization.
  The legacy MFS Africa developer hub (developer.mfsafrica.com) remains the
  canonical reference documentation, with a newer developers.onafriq.com portal
  reflecting the post-rebrand identity.
